# Render.com 配置文件
services:
  - type: web
    name: demo-bot
    env: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: demo-bot
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: demo-bot-redis
          property: connectionString
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FIRST_SUPERUSER
        sync: false
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false