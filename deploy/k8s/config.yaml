apiVersion: v1
kind: ConfigMap
metadata:
  name: smart-line-bot-config
data:
  DATABASE_URL: "postgresql://postgres:postgres@smart-line-bot-postgres:5432/demo_project"
  REDIS_URL: "redis://smart-line-bot-redis:6379/0"
  CELERY_BROKER_URL: "redis://smart-line-bot-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://smart-line-bot-redis:6379/0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  API_V1_STR: "/api/v1"
---
apiVersion: v1
kind: Secret
metadata:
  name: smart-line-bot-secrets
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
  LINE_CHANNEL_ACCESS_TOKEN: "your-line-channel-access-token"
  LINE_CHANNEL_SECRET: "your-line-channel-secret"
  OPENAI_API_KEY: "your-openai-api-key"
  POSTGRES_PASSWORD: "postgres"