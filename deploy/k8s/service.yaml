apiVersion: v1
kind: Service
metadata:
  name: smart-line-bot-web
  labels:
    app: smart-line-bot
    tier: web
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: smart-line-bot
    tier: web
---
apiVersion: v1
kind: Service
metadata:
  name: smart-line-bot-redis
  labels:
    app: smart-line-bot
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: smart-line-bot-postgres
  labels:
    app: smart-line-bot
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    app: postgres