apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-line-bot-web
  labels:
    app: smart-line-bot
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-line-bot
      tier: web
  template:
    metadata:
      labels:
        app: smart-line-bot
        tier: web
    spec:
      containers:
      - name: web
        image: smart-line-bot:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: smart-line-bot-config
        - secretRef:
            name: smart-line-bot-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-line-bot-worker
  labels:
    app: smart-line-bot
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-line-bot
      tier: worker
  template:
    metadata:
      labels:
        app: smart-line-bot
        tier: worker
    spec:
      containers:
      - name: worker
        image: smart-line-bot:latest
        command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: smart-line-bot-config
        - secretRef:
            name: smart-line-bot-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-line-bot-beat
  labels:
    app: smart-line-bot
    tier: beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-line-bot
      tier: beat
  template:
    metadata:
      labels:
        app: smart-line-bot
        tier: beat
    spec:
      containers:
      - name: beat
        image: smart-line-bot:latest
        command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: smart-line-bot-config
        - secretRef:
            name: smart-line-bot-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"